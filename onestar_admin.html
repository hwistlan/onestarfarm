<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 설정 — 한별농원</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a0e05; color: #f5e6d3; font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; padding-bottom: 80px; }
.shell { max-width: 500px; margin: 0 auto; }

header { padding: 20px; border-bottom: 1px solid #2d1a0d; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #1a0e05; z-index: 100; }
.brand { font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 17px; color: #f5e6d3; }
.exit-btn { color: #8b5e3c; text-decoration: none; font-size: 13px; font-weight: 600; }

.section-title { padding: 30px 20px 12px; font-size: 13px; color: #8b5e3c; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: #2d1a0d; }

.card { background: #25160d; margin: 0 16px 16px; border-radius: 20px; padding: 24px; border: 1px solid #2d1a0d; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }

.input-group { margin-bottom: 18px; }
label { display: block; font-size: 12px; color: #5a3e28; margin-bottom: 8px; font-weight: 600; }
input, textarea { width: 100%; background: #1a0e05; border: 1px solid #3d2516; border-radius: 12px; padding: 14px; color: #fff; font-size: 14px; outline: none; transition: 0.2s; }
input:focus, textarea:focus { border-color: #8b5e3c; background: #1d1007; }

.save-btn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 468px; padding: 18px; background: #8b5e3c; color: #fff; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 200; }
.save-btn:active { transform: translateX(-50%) scale(0.98); }

.notion-status { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #8b5e3c; margin-top: 15px; background: #1a0e05; padding: 10px; border-radius: 10px; }
.status-dot { width: 10px; height: 10px; background: #444; border-radius: 50%; }
.status-dot.on { background: #1D9E75; box-shadow: 0 0 10px rgba(29, 158, 117, 0.5); }

.var-item { background: #1d1007; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #3d2516; position: relative; }
.var-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.del-btn { color: #ff6b6b; font-size: 12px; cursor: pointer; padding: 4px 8px; background: rgba(255, 107, 107, 0.1); border-radius: 6px; }
</style>
</head>
<body>

<header>
  <div class="brand">한별농원 설정</div>
  <a href="./index.html" class="exit-btn">닫기</a>
</header>

<div class="shell">
  <div class="section-title">기본 정보</div>
  <div class="card">
    <div class="input-group">
      <label>상단 공지 메세지</label>
      <textarea id="farm-notice" rows="3" placeholder="메인 화면에 노출될 안내 문구"></textarea>
    </div>
    <div class="input-group">
      <label>문의 연락처</label>
      <input type="text" id="farm-phone" placeholder="010-0000-0000">
    </div>
    <div class="input-group">
      <label>농장 주소</label>
      <input type="text" id="farm-addr" placeholder="주소 입력">
    </div>
  </div>

  <div class="section-title">결제 계좌 정보</div>
  <div class="card">
    <div class="input-group"><label>은행</label><input type="text" id="bank-name" placeholder="농협, 신한 등"></div>
    <div class="input-group"><label>계좌번호</label><input type="text" id="acct-num" placeholder="- 포함 입력"></div>
    <div class="input-group"><label>예금주</label><input type="text" id="acct-holder" placeholder="성함 또는 농원명"></div>
  </div>

  <div class="section-title">상품 목록</div>
  <div class="card">
    <div id="var-list"></div>
    <button onclick="addVariety()" style="background:transparent; border:2px dashed #4a2c1a; color:#8b5e3c; width:100%; padding:15px; border-radius:12px; cursor:pointer; font-size:14px; font-weight:600;">+ 상품 추가하기</button>
  </div>

  <div class="section-title">외부 연동 (노션)</div>
  <div class="card">
    <div class="input-group">
      <label>Notion API Token</label>
      <input type="password" id="notion-token" placeholder="secret_...">
    </div>
    <div class="input-group">
      <label>Database ID</label>
      <input type="text" id="notion-db-id" placeholder="노션 데이터베이스 ID">
    </div>
    <div class="notion-status">
      <div id="notion-dot" class="status-dot"></div>
      <span id="notion-text">데이터는 현재 브라우저에 저장됩니다.</span>
    </div>
  </div>

  <button class="save-btn" onclick="saveAll()">설정 내용 저장하기</button>
</div>

<script>
function addVariety() {
  const list = document.getElementById('var-list');
  const div = document.createElement('div');
  div.className = 'var-item';
  div.innerHTML = `
    <div class="var-header">
      <span style="font-size:13px; font-weight:600;">상품 정보</span>
      <span class="del-btn" onclick="this.parentElement.parentElement.remove()">삭제</span>
    </div>
    <input type="text" placeholder="상품명 (예: 부사 5kg)" class="v-name" style="margin-bottom:10px">
    <input type="text" placeholder="가격 (예: 35,000원)" class="v-price" style="margin-bottom:10px">
    <input type="text" placeholder="상품 설명 (예: 당도 높은 햇사과)" class="v-desc">
  `;
  list.appendChild(div);
}

function saveAll() {
  localStorage.setItem('hb_notice', document.getElementById('farm-notice').value);
  localStorage.setItem('hb_phone', document.getElementById('farm-phone').value);
  localStorage.setItem('hb_addr', document.getElementById('farm-addr').value);
  localStorage.setItem('hb_bank', document.getElementById('bank-name').value);
  localStorage.setItem('hb_account', document.getElementById('acct-num').value);
  localStorage.setItem('hb_holder', document.getElementById('acct-holder').value);
  
  const nToken = document.getElementById('notion-token').value;
  localStorage.setItem('hb_notion_token', nToken);
  localStorage.setItem('hb_notion_db_id', document.getElementById('notion-db-id').value);

  const vars = [];
  document.querySelectorAll('.var-item').forEach(item => {
    const name = item.querySelector('.v-name').value;
    if(name) {
      vars.push({
        name: name,
        price: item.querySelector('.v-price').value,
        desc: item.querySelector('.v-desc').value
      });
    }
  });
  localStorage.setItem('hb_variety', JSON.stringify(vars));

  alert("모든 설정이 저장되었습니다.\n메인 화면에서 확인하세요.");
  location.href = './index.html';
}

window.onload = () => {
  document.getElementById('farm-notice').value = localStorage.getItem('hb_notice') || "";
  document.getElementById('farm-phone').value = localStorage.getItem('hb_phone') || "";
  document.getElementById('farm-addr').value = localStorage.getItem('hb_addr') || "";
  document.getElementById('bank-name').value = localStorage.getItem('hb_bank') || "";
  document.getElementById('acct-num').value = localStorage.getItem('hb_account') || "";
  document.getElementById('acct-holder').value = localStorage.getItem('hb_holder') || "";
  
  const token = localStorage.getItem('hb_notion_token');
  if(token) {
    document.getElementById('notion-token').value = token;
    document.getElementById('notion-db-id').value = localStorage.getItem('hb_notion_db_id') || "";
    document.getElementById('notion-dot').classList.add('on');
    document.getElementById('notion-text').innerText = "노션 연동 정보가 설정되어 있습니다.";
  }

  const vars = JSON.parse(localStorage.getItem('hb_variety') || '[]');
  vars.forEach(v => {
    const list = document.getElementById('var-list');
    const div = document.createElement('div');
    div.className = 'var-item';
    div.innerHTML = `
      <div class="var-header">
        <span style="font-size:13px; font-weight:600;">상품 정보</span>
        <span class="del-btn" onclick="this.parentElement.parentElement.remove()">삭제</span>
      </div>
      <input type="text" value="${v.name}" class="v-name" style="margin-bottom:10px">
      <input type="text" value="${v.price}" class="v-price" style="margin-bottom:10px">
      <input type="text" value="${v.desc}" class="v-desc">
    `;
    list.appendChild(div);
  });
};
</script>
</body>
</html>
