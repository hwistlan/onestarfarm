<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한별농원 관리자 도구</title>
<style>
    body { background: #2c1a0f; color: #f5e6d3; font-family: sans-serif; padding: 20px; margin: 0; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 500px; background: #1a0f08; border-radius: 20px; padding: 25px; }
    .section-title { font-size: 18px; color: #ff7675; margin: 30px 0 15px; border-bottom: 1px solid #3d2516; padding-bottom: 5px; }
    .card { background: #25160d; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
    input, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid #4a2c1a; color: #fff; border-radius: 8px; box-sizing: border-box; margin-top: 5px; }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; color: #fff; }
    .btn-notion { background: #27ae60; }
</style>
</head>
<body>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1 style="font-size:20px;">ONESTAR <span style="color:#e67e22;">ADMIN</span></h1>
            <button onclick="location.href='index.html'" style="background:none; border:1px solid #5d4037; color:#a38b7a; border-radius:5px; cursor:pointer;">로그아웃</button>
        </div>

        <div class="section-title">🍎 가격 실시간 수정</div>
        <div class="card">
            <label style="font-size:12px;">홍로 선물용 가격</label>
            <input type="number" value="120000">
            <button class="btn" style="background:#d35400;" onclick="alert('웹사이트 가격이 수정되었습니다.')">가격 업데이트</button>
        </div>

        <div class="section-title">📖 노션에 농원 이야기 쓰기</div>
        <div class="card">
            <label style="font-size:12px;">제목 (노션 '주문명')</label>
            <input type="text" id="n-title" placeholder="이야기 제목">
            <label style="font-size:12px; display:block; margin-top:10px;">내용 (노션 '배송주소')</label>
            <textarea id="n-content" rows="5" placeholder="내용을 입력하세요..."></textarea>
            <button class="btn btn-notion" onclick="sendToNotion()">노션으로 전송</button>
        </div>
    </div>

    <script>
        // 사장님의 시크릿 키를 아래 따옴표 안에 넣어주세요!
        const NOTION_TOKEN = "여기에_시크릿_키를_넣으세요";
        const DATABASE_ID = "e90fe608320147fa95b4e245d95bee0e";

        async function sendToNotion() {
            const title = document.getElementById('n-title').value;
            const content = document.getElementById('n-content').value;
            if(!title || !content) return alert("내용을 입력해주세요.");

            try {
                const response = await fetch(`https://api.notion.com/v1/pages`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${NOTION_TOKEN}`,
                        "Content-Type": "application/json",
                        "Notion-Version": "2022-06-28"
                    },
                    body: JSON.stringify({
                        parent: { database_id: DATABASE_ID },
                        properties: {
                            "주문명": { title: [{ text: { content: title } }] },
                            "배송주소": { rich_text: [{ text: { content: content } }] }
                        }
                    })
                });
                if(response.ok) {
                    alert("노션에 성공적으로 게시되었습니다!");
                    document.getElementById('n-title').value = "";
                    document.getElementById('n-content').value = "";
                } else {
                    alert("전송 실패! 노션 연결 설정을 확인하세요.");
                }
            } catch(e) {
                alert("연결 오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
