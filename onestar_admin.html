<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 도구 - 한별농원</title>
    <style>
        body { background-color: #2c1a0f; color: #f5e6d3; font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: #1a0f08; border-radius: 15px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 18px; color: #ff7675; margin: 25px 0 15px; border-bottom: 1px solid #3d2516; padding-bottom: 5px; }
        .card { background: #25160d; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #8b5e3c; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid #4a2c1a; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; color: #fff; }
        .btn-save { background: #d35400; }
        .btn-notion { background: #27ae60; }
        .logout-btn { background: #3d2516; color: #a38b7a; border: none; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 style="font-size: 20px; margin: 0;">관리자 모드</h1>
            <button class="logout-btn" onclick="location.href='index.html'">로그아웃</button>
        </div>

        <div class="section-title">🍎 가격 정보 수정</div>
        <div class="card">
            <label>선물용 (15과 이내)</label>
            <input type="number" value="120000">
            <label style="margin-top:10px;">가정용 (16~20과)</label>
            <input type="number" value="85000">
            <button class="btn btn-save" onclick="alert('가격이 저장되었습니다!')">웹사이트 가격 저장</button>
        </div>

        <div class="section-title">📖 노션 이야기 쓰기</div>
        <div class="card">
            <label>이야기 제목 (노션 '주문명' 열)</label>
            <input type="text" id="n-title" placeholder="제목을 입력하세요">
            <label style="margin-top:10px;">내용 (노션 '배송주소' 열)</label>
            <textarea id="n-content" rows="4" placeholder="내용을 입력하세요"></textarea>
            <button class="btn btn-notion" onclick="saveToNotion()">노션 전송하기</button>
        </div>
    </div>

    <script>
        // 이 곳에 사장님의 시크릿 키를 넣으세요!
        const NOTION_TOKEN = "여기에_시크릿_키를_넣으세요";
        const DATABASE_ID = "e90fe608320147fa95b4e245d95bee0e";

        async function saveToNotion() {
            const title = document.getElementById('n-title').value;
            const content = document.getElementById('n-content').value;
            if(!title || !content) return alert("제목과 내용을 입력하세요.");

            try {
                const response = await fetch(`https://api.notion.com/v1/pages`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${NOTION_TOKEN}`,
                        "Content-Type": "application/json",
                        "Notion-Version": "2022-06-28"
                    },
                    body: JSON.stringify({
                        parent: { database_id: DATABASE_ID },
                        properties: {
                            "주문명": { title: [{ text: { content: title } }] },
                            "배송주소": { rich_text: [{ text: { content: content } }] }
                        }
                    })
                });

                if (response.ok) {
                    alert("성공! 노션에 등록되었습니다.");
                    document.getElementById('n-title').value = "";
                    document.getElementById('n-content').value = "";
                } else {
                    alert("오류! 노션 연동 설정을 확인하세요.");
                }
            } catch (e) {
                alert("통신 오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
