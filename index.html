<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한별농원 — 2026 햇사과 산지직송</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    :root { --brown: #2c1e0f; --red: #c8421a; --cream: #fdf8f2; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #ede4d8; color: var(--brown); margin: 0; padding: 0; }
    .hero { background: #1a0f08; color: #fff; padding: 60px 20px; text-align: center; }
    .hero h1 { font-family: 'Noto Serif KR'; font-size: 32px; margin-bottom: 10px; }
    .hero p { color: #a38b7a; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .product-section { background: #fff; border-radius: 20px; padding: 30px; margin-top: -30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .price-tag { color: var(--red); font-weight: bold; font-size: 20px; }
    .footer { text-align: center; padding: 40px; color: #8b5e3c; font-size: 13px; }
    .admin-trigger { color: #ede4d8; text-decoration: none; font-size: 14px; margin-top: 20px; display: inline-block; }
</style>
</head>
<body>
    <div class="hero">
        <h1>🍎 한별농원</h1>
        <p>충주 소태면의 햇살을 담은 프리미엄 사과</p>
    </div>
    <div class="container">
        <div class="product-section">
            <h2 style="font-family:'Noto Serif KR';">현재 판매 중인 사과</h2>
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <span>홍로 선물용 (15과 내외)</span>
                <span class="price-tag">120,000원</span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <span>홍로 가정용 (16~20과)</span>
                <span class="price-tag">85,000원</span>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="color:#777;">홍로 실속형 (흠과)</span>
                <span class="price-tag" style="color:#e67e22;">70,000원</span>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>© 2026 ONESTAR FARM. All rights reserved.</p>
        <!-- 사장님만 아는 비밀 버튼 -->
        <a href="login.html" class="admin-trigger">⚙️</a>
    </div>
</body>
</html>
