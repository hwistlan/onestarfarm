<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한별농원 관리자 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a0e05;
  color: #f5e6d3;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Noto Sans KR', sans-serif;
  padding: 20px;
}
.box {
  background: #25160d;
  padding: 40px 36px;
  border-radius: 24px;
  width: 100%;
  max-width: 360px;
  text-align: center;
  border: 0.5px solid #4a2c1a;
}
.logo { font-size: 36px; margin-bottom: 12px; }
.title {
  font-family: 'Noto Serif KR', serif;
  font-size: 18px;
  font-weight: 700;
  color: #f5e6d3;
  margin-bottom: 4px;
}
.subtitle { font-size: 11px; color: #8b5e3c; margin-bottom: 32px; letter-spacing: 2px; }
.form-group { margin-bottom: 12px; text-align: left; }
.form-label { font-size: 11px; color: #8b5e3c; display: block; margin-bottom: 5px; font-weight: 500; letter-spacing: 0.5px; }
input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 0.5px solid #4a2c1a;
  background: #1a0e05;
  color: #f5e6d3;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
input:focus { border-color: #c8421a; }
input::placeholder { color: #5a3e28; }
.login-btn {
  width: 100%;
  padding: 13px;
  border-radius: 10px;
  border: none;
  background: #c8421a;
  color: #fff3ec;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  margin-top: 8px;
  transition: background 0.15s;
  letter-spacing: 0.5px;
}
.login-btn:hover { background: #a83210; }
.error-msg {
  font-size: 12px;
  color: #ff7675;
  margin-top: 10px;
  min-height: 18px;
  text-align: center;
}
.back-btn {
  display: block;
  margin-top: 20px;
  font-size: 12px;
  color: #5a3e28;
  text-decoration: none;
  cursor: pointer;
  transition: color 0.15s;
}
.back-btn:hover { color: #8b5e3c; }
.enter-hint {
  font-size: 10px;
  color: #3d2516;
  margin-top: 24px;
}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🍎</div>
  <div class="title">한별농원</div>
  <div class="subtitle">ADMIN LOGIN</div>

  <div class="form-group">
    <label class="form-label">아이디</label>
    <input type="text" id="uid" placeholder="관리자 아이디" autocomplete="username" />
  </div>
  <div class="form-group">
    <label class="form-label">비밀번호</label>
    <input type="password" id="upw" placeholder="비밀번호" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') doLogin()" />
  </div>

  <button class="login-btn" onclick="doLogin()">로그인</button>
  <div class="error-msg" id="err-msg"></div>

  <a class="back-btn" onclick="history.back()">← 홈으로 돌아가기</a>
  <div class="enter-hint">Enter 키로도 로그인 가능합니다</div>
</div>

<script>
function doLogin() {
  const uid = document.getElementById('uid').value.trim();
  const upw = document.getElementById('upw').value;
  const msg = document.getElementById('err-msg');
  if (!uid || !upw) { msg.textContent = '아이디와 비밀번호를 입력해주세요.'; return; }
  if (uid === 'admin' && upw === 'han190704!') {
    sessionStorage.setItem('hb_admin_auth', 'true');
    location.href = 'onestar_admin.html';
  } else {
    msg.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
    document.getElementById('upw').value = '';
    document.getElementById('upw').focus();
    setTimeout(() => msg.textContent = '', 3000);
  }
}
</script>
</body>
</html>
