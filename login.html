<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - 한별농원</title>
    <style>
        body { background-color: #1a0f08; color: #f5e6d3; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: #25160d; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; text-align: center; }
        h2 { margin-bottom: 30px; font-size: 20px; color: #ff7675; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #4a2c1a; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #d35400; color: #fff; font-weight: bold; cursor: pointer; }
        button:hover { background: #e67e22; }
        .back-link { display: block; margin-top: 20px; font-size: 12px; color: #a38b7a; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>ADMIN LOGIN</h2>
        <input type="text" id="adminId" placeholder="관리자 아이디">
        <input type="password" id="adminPw" placeholder="비밀번호">
        <button onclick="checkLogin()">로그인</button>
        <a href="index.html" class="back-link">메인으로 돌아가기</a>
    </div>

    <script>
        function checkLogin() {
            const id = document.getElementById('adminId').value;
            const pw = document.getElementById('adminPw').value;
            if (id === 'admin' && pw === 'han190704!') {
                alert('로그인 성공!');
                location.href = 'onestar_admin.html';
            } else {
                alert('아이디 또는 비밀번호가 틀렸습니다.');
            }
        }
    </script>
</body>
</html>
