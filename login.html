<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — 한별농원</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a0e05;
  color: #f5e6d3;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Noto Sans KR', sans-serif;
  padding: 20px;
}
.box {
  background: #25160d;
  padding: 50px 35px;
  border-radius: 30px;
  width: 100%;
  max-width: 400px;
  text-align: center;
  border: 1px solid #3d2516;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}
.logo { font-size: 48px; margin-bottom: 15px; }
.title { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; margin-bottom: 35px; color: #f5e6d3; letter-spacing: 0.5px; }

.form-group { text-align: left; margin-bottom: 22px; }
.form-label { font-size: 12px; color: #8b5e3c; margin-bottom: 8px; display: block; font-weight: 600; padding-left: 4px; text-transform: uppercase; }
input {
  width: 100%;
  background: #1a0e05;
  border: 1px solid #4a2c1a;
  border-radius: 14px;
  padding: 16px;
  color: #fff;
  font-size: 15px;
  outline: none;
  transition: all 0.3s;
}
input:focus { border-color: #8b5e3c; background: #201208; box-shadow: 0 0 10px rgba(139, 94, 60, 0.2); }

.login-btn {
  width: 100%;
  padding: 16px;
  background: #8b5e3c;
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 15px;
  transition: 0.3s;
}
.login-btn:hover { background: #a6734d; transform: translateY(-2px); }

.error-msg { color: #ff6b6b; font-size: 13px; margin-top: 20px; min-height: 20px; font-weight: 500; }
.back-link { display: inline-block; margin-top: 30px; color: #5a3e28; text-decoration: none; font-size: 14px; border-bottom: 1px solid #3d2516; padding-bottom: 2px; }
</style>
</head>
<body>

<div class="box">
  <div class="logo">🍎</div>
  <div class="title">한별농원 관리자</div>

  <div class="form-group">
    <label class="form-label">아이디</label>
    <input type="text" id="uid" placeholder="아이디를 입력하세요" autocomplete="username">
  </div>
  <div class="form-group">
    <label class="form-label">비밀번호</label>
    <input type="password" id="upw" placeholder="비밀번호를 입력하세요" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
  </div>

  <button class="login-btn" onclick="doLogin()">관리자 로그인</button>
  <div class="error-msg" id="err-msg"></div>

  <a href="./index.html" class="back-link">메인으로 돌아가기</a>
</div>

<script>
function doLogin() {
  const uid = document.getElementById('uid').value.trim();
  const upw = document.getElementById('upw').value;
  const msg = document.getElementById('err-msg');
  
  // 보안상 깃허브에는 평문 비번을 두지 않는 것이 좋으나 요청하신 로직 유지
  if (uid === 'admin' && upw === '1234') {
    location.href = './onestar_admin.html'; // 파일명 확인 필수
  } else {
    msg.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
  }
}
</script>
</body>
</html>
